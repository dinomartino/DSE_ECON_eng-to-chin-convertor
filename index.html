<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSE 翻譯提示產生器 · 英 ⇄ 繁中</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface2: #f4f4f5;
      --border: #d4d4d8;
      --accent: #000000;
      --accent-hover: #2a2a2a;
      --text: #000000;
      --text-muted: #6b7280;
      --green: #16a34a;
      --red: #dc2626;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    }

    body {
      background: #fafafa;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header { text-align: center; margin-bottom: 24px; }
    header h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* Toggle bars (subject + direction) */
    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .toggle-row { display: flex; flex-direction: column; gap: 6px; }
    .seg {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 5px;
    }
    .seg button {
      flex: 1 1 auto;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .seg button:hover:not(.active) { color: var(--text); }
    .seg button.active {
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      padding: 12px 14px;
      line-height: 1.6;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 22px;
      transition: background .2s, opacity .2s, border-color .2s, color .2s;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    /* Glossary matches */
    #matches-section { display: none; }
    .matches-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .badge {
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 10px;
    }
    .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .matches-grid::-webkit-scrollbar { width: 5px; }
    .matches-grid::-webkit-scrollbar-track { background: transparent; }
    .matches-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .match-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .match-en { font-size: 0.82rem; color: var(--text-muted); font-weight: 600; }
    .match-zh { font-size: 0.95rem; color: var(--text); font-weight: 600; }

    /* Prompt output */
    #output-section { display: none; }
    .prompt-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.92rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 420px;
      overflow-y: auto;
    }
    .prompt-box::-webkit-scrollbar { width: 5px; }
    .prompt-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .copy-row {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .hint {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 10px;
      line-height: 1.5;
    }

    .error-box {
      background: rgba(248, 113, 113, .12);
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      display: none;
    }

    @media (max-width: 520px) {
      .card { padding: 16px; }
      .actions { flex-direction: column; }
      .actions button { width: 100%; }
      .seg button { flex: 1 1 40%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>DSE 翻譯提示產生器 &nbsp;英 ⇄ 中</h1>
    <p>根據香港教育局官方英漢詞彙表建立翻譯提示，可複製到 ChatGPT、Gemini、Claude 或任何 AI 聊天機械人使用。</p>
  </header>

  <div class="container">

    <!-- Subject + direction toggles -->
    <div class="card toolbar">
      <div class="toggle-row">
        <label>選擇科目</label>
        <div class="seg" id="subject-bar"></div>
      </div>
      <div class="toggle-row">
        <label>翻譯方向</label>
        <div class="seg" id="direction-bar">
          <button data-dir="en2zh" class="active">英文 → 繁體中文</button>
          <button data-dir="zh2en">繁體中文 → 英文</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="card">
      <label for="input-text" id="input-label">輸入英文內容</label>
      <textarea id="input-text"></textarea>
      <div class="actions">
        <button class="btn-primary" id="btn-build">建立翻譯 Prompt</button>
        <button class="btn-secondary" id="btn-clear">清除</button>
      </div>
      <div class="error-box" id="error-box"></div>
    </div>

    <!-- Glossary matches -->
    <div class="card" id="matches-section">
      <div class="matches-header">
        <label style="margin:0">找到的詞彙配對</label>
        <span class="badge" id="match-count">0</span>
      </div>
      <div class="matches-grid" id="matches-grid"></div>
    </div>

    <!-- Prompt output -->
    <div class="card" id="output-section">
      <label>你的提示 — 複製並貼上到任何 AI 聊天機械人</label>
      <div class="prompt-box" id="prompt-output"></div>
      <div class="copy-row">
        <button class="btn-primary" id="btn-copy">複製提示</button>
      </div>
      <p class="hint">將內容貼上到 ChatGPT、Gemini、Claude 或你慣用的 AI，即可取得詞彙準確的翻譯。</p>
    </div>

  </div>

  <script>
    // ---- Subjects: maps to glossaries/<file> ----
    const SUBJECTS = [
      { id: "economics", file: "glossaries/economics.json", zh: "經濟", en: "Economics" },
      { id: "ces",       file: "glossaries/ces.json",       zh: "公經社", en: "Citizenship, Economics & Society" },
      { id: "geography", file: "glossaries/geography.json", zh: "地理", en: "Geography" },
      { id: "history",   file: "glossaries/history.json",   zh: "歷史", en: "History" },
      { id: "ths",       file: "glossaries/ths.json",       zh: "旅遊與款待", en: "Tourism & Hospitality" },
    ];

    const PLACEHOLDERS = {
      en2zh: "例如：How does aggregate demand affect the price level?",
      zh2en: "例如：總需求如何影響物價水平？",
    };

    let activeSubject = SUBJECTS[0].id;
    let direction = "en2zh";              // default English → Traditional Chinese
    const cache = {};                     // id -> { entries }
    let ENTRIES = {};

    const inputEl = document.getElementById("input-text");
    const inputLabel = document.getElementById("input-label");
    const btnBuild = document.getElementById("btn-build");
    const btnClear = document.getElementById("btn-clear");
    const btnCopy = document.getElementById("btn-copy");
    const subjectBar = document.getElementById("subject-bar");
    const directionBar = document.getElementById("direction-bar");
    const matchesSection = document.getElementById("matches-section");
    const matchesGrid = document.getElementById("matches-grid");
    const matchCount = document.getElementById("match-count");
    const outputSection = document.getElementById("output-section");
    const promptOutput = document.getElementById("prompt-output");
    const errorBox = document.getElementById("error-box");

    // ---- Build subject toggle bar ----
    SUBJECTS.forEach((s, i) => {
      const b = document.createElement("button");
      b.textContent = s.zh;
      b.title = s.en;
      b.dataset.subject = s.id;
      if (i === 0) b.classList.add("active");
      b.addEventListener("click", () => selectSubject(s.id));
      subjectBar.appendChild(b);
    });

    function currentSubject() {
      return SUBJECTS.find(s => s.id === activeSubject);
    }

    // ---- Load a glossary (cached) and refresh the live view ----
    async function loadSubject(id) {
      if (cache[id]) { ENTRIES = cache[id]; return; }
      const sub = SUBJECTS.find(s => s.id === id);
      try {
        const data = await (await fetch(sub.file)).json();
        cache[id] = data.entries || {};
        ENTRIES = cache[id];
      } catch (_) {
        ENTRIES = {};
        setError("無法載入詞彙表：" + sub.file);
      }
    }

    async function selectSubject(id) {
      activeSubject = id;
      [...subjectBar.children].forEach(b =>
        b.classList.toggle("active", b.dataset.subject === id));
      setError("");
      await loadSubject(id);
      liveSearch(inputEl.value);
    }

    function selectDirection(dir) {
      direction = dir;
      [...directionBar.children].forEach(b =>
        b.classList.toggle("active", b.dataset.dir === dir));
      inputEl.placeholder = PLACEHOLDERS[dir];
      inputLabel.textContent = dir === "en2zh" ? "輸入英文內容" : "輸入繁體中文內容";
      liveSearch(inputEl.value);
    }
    directionBar.querySelectorAll("button").forEach(b =>
      b.addEventListener("click", () => selectDirection(b.dataset.dir)));

    // ---- Matching (direction-aware) ----
    // en2zh: scan the input for English keys.
    // zh2en: scan the input for Chinese translations (each value may hold several
    //        synonyms split by / ／ ； ; , ，— we test every fragment).
    function findMatchingPairs(text) {
      const matches = [];
      if (direction === "en2zh") {
        const lower = text.toLowerCase();
        for (const [eng, chi] of Object.entries(ENTRIES)) {
          if (lower.includes(eng.toLowerCase())) {
            matches.push({ english: eng, chinese: chi, hit: eng });
          }
        }
        matches.sort((a, b) => b.hit.length - a.hit.length);
      } else {
        for (const [eng, chi] of Object.entries(ENTRIES)) {
          // Split a translation into candidate Chinese synonyms on real separators
          // only (slash / semicolon / comma / 、 and numbered-sense markers). We do
          // NOT split on brackets, because optional parts like 風化 [作用] must stay
          // whole — otherwise a generic tail like 作用 would match almost everything.
          // For each fragment we also offer a bracket-stripped form so 風化 [作用]
          // matches the user's 風化作用.
          const frags = [];
          for (let f of chi.split(/[\/／；;，,、]|\([0-9０-９]+\)|（[0-9０-９]+）/)) {
            f = f.trim();
            if (f.length >= 2) frags.push(f);
            const stripped = f.replace(/[\[\]｛｝{}（）()<>＜＞〈〉【】]/g, "").replace(/\s+/g, "").trim();
            if (stripped.length >= 2 && stripped !== f) frags.push(stripped);
          }
          // Match on the longest fragment present in the input (most specific wins),
          // and require ≥2 Han characters so single generic chars don't over-match.
          let hit = null;
          for (const f of frags) {
            if (f.length >= 2 && text.includes(f) && (!hit || f.length > hit.length)) hit = f;
          }
          if (hit) matches.push({ english: eng, chinese: chi, hit });
        }
        matches.sort((a, b) => b.hit.length - a.hit.length);
      }
      // De-duplicate on the english term, keep first (longest hit) occurrence.
      const seen = new Set();
      return matches.filter(m => !seen.has(m.english) && seen.add(m.english));
    }

    function buildPrompt(text, matches) {
      const sub = currentSubject();
      const subjectName = sub.en;
      let glossaryBlock = "";
      if (matches.length) {
        const lines = matches
          .map(m => direction === "en2zh"
            ? `  ${m.english} → ${m.chinese}`
            : `  ${m.chinese} → ${m.english}`)
          .join("\n");
        glossaryBlock =
          `Use the following official HKSAR ${subjectName} glossary to ensure accurate terminology:\n` +
          lines + "\n\n";
      }
      if (direction === "en2zh") {
        return glossaryBlock +
          "Translate the following text into Traditional Chinese (Hong Kong standard). " +
          "Return only the translation, no explanations:\n\n" + text;
      }
      return glossaryBlock +
        "Translate the following Traditional Chinese text into English. " +
        "Return only the translation, no explanations:\n\n" + text;
    }

    let debounceTimer = null;
    inputEl.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => liveSearch(inputEl.value), 250);
    });

    function liveSearch(text) {
      if (!text.trim()) { matchesSection.style.display = "none"; return; }
      renderMatches(findMatchingPairs(text));
    }

    function renderMatches(matches) {
      if (!matches.length) { matchesSection.style.display = "none"; return; }
      matchCount.textContent = matches.length;
      matchesGrid.innerHTML = matches.map(m => `
        <div class="match-item">
          <span class="match-en">${escapeHtml(m.english)}</span>
          <span class="match-zh">${escapeHtml(m.chinese)}</span>
        </div>
      `).join("");
      matchesSection.style.display = "block";
    }

    btnBuild.addEventListener("click", () => {
      const text = inputEl.value.trim();
      setError("");
      if (!text) { setError("請先輸入內容。"); return; }
      const matches = findMatchingPairs(text);
      renderMatches(matches);
      promptOutput.textContent = buildPrompt(text, matches);
      outputSection.style.display = "block";
      outputSection.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });

    btnClear.addEventListener("click", () => {
      inputEl.value = "";
      matchesSection.style.display = "none";
      outputSection.style.display = "none";
      setError("");
      inputEl.focus();
    });

    btnCopy.addEventListener("click", () => {
      navigator.clipboard.writeText(promptOutput.textContent).then(() => {
        btnCopy.textContent = "已複製！";
        setTimeout(() => btnCopy.textContent = "複製提示", 1500);
      });
    });

    function setError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = msg ? "block" : "none";
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ---- Init ----
    inputEl.placeholder = PLACEHOLDERS.en2zh;
    loadSubject(activeSubject);
  </script>
</body>
</html>
